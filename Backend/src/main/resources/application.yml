spring:
  application:
    name: DevPulse

  datasource:
    url: jdbc:mysql://localhost:3306/devpulse
    username: root
    password: passward@1

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.MySQLDialect

github:
  client-id: ${GITHUB_CLIENT_ID}
  client-secret: ${GITHUB_CLIENT_SECRET}
  redirect-uri: ${GITHUB_REDIRECT_URI}